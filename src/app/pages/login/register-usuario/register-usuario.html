<div class="modal-overlay">
  <div class="modal-box">
    <button class="close-btn" (click)="cerrar.emit()">✖</button>
    <h2>Registro</h2>

    
    <div class="rol-selector">

      <button 
        type="button"
        [class.activo]="rol === 'Cliente'"
        (click)="rol = 'Cliente'">
        👤 Cliente
      </button>

      <button 
        type="button"
        [class.activo]="rol === 'Vendedor'"
        (click)="rol = 'Vendedor'">
        🛠 Vendedor
      </button>

    </div>
    
   
    <input type="text" placeholder="Nombre" [(ngModel)]="nombre">
    <input type="text" placeholder="Apellido" [(ngModel)]="apellido">
    <input type="email" placeholder="Correo" [(ngModel)]="correo">
    <input type="password" placeholder="Contraseña" [(ngModel)]="password">
    <input type="text" placeholder="Teléfono" [(ngModel)]="telefono">

   
    <button 
      type="button" 
      class="btn-primary" 
      (click)="registrar()">
      Registrarse
    </button>
    
  
    <p style="color:red; margin-top:10px;">
      {{ mensaje }}
    </p>

  </div>
</div>
