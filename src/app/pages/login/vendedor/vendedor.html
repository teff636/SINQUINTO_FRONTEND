<div class="container">

  <header class="topbar">
    <h1>Servi<span class="click">Click</span></h1>
    <div class="profile">{{ iniciales }}</div>
  </header>

  <div class="search-box">
    🔎
    <input type="text" placeholder="Buscar servicios..." />
  </div>

  <div class="categories">
    <button [class.active]="categoriaActiva === 'Todos'" (click)="filtrarCategoria('Todos')">Todos</button>
    <button [class.active]="categoriaActiva === 'Tecnología'" (click)="filtrarCategoria('Tecnología')">Tecnología</button>
    <button [class.active]="categoriaActiva === 'Diseño'" (click)="filtrarCategoria('Diseño')">Diseño</button>
    <button [class.active]="categoriaActiva === 'Hogar'" (click)="filtrarCategoria('Hogar')">Hogar</button>
    <button [class.active]="categoriaActiva === 'Clases'" (click)="filtrarCategoria('Clases')">Clases</button>
    <button [class.active]="categoriaActiva === 'Legal'" (click)="filtrarCategoria('Legal')">Legal</button>
  </div>

  <div class="services-container" *ngIf="serviciosFiltrados.length > 0">
    <div class="service-card" *ngFor="let servicio of serviciosFiltrados">
      <div class="service-image">
        <img *ngIf="servicio.photo" [src]="servicio.photo">
        <div *ngIf="!servicio.photo" class="placeholder">📷</div>
      </div>
      <div class="service-info">
        <h3>{{ servicio.title }}</h3>
        <p class="categoria">{{ servicio.category }}</p>
        <p class="precio">$ {{ servicio.price }}</p>
      </div>
    </div>
  </div>

  <div class="empty-content" *ngIf="serviciosFiltrados.length === 0">
    <h2>Bienvenido vendedor</h2>
    <p>Aquí podrás publicar tus servicios y administrar tus publicaciones.</p>
  </div>

  <button class="btn-add" (click)="abrirFormulario()">+</button>

  <div *ngIf="mostrarFormulario" class="modal">
    <div class="modal-content">
      <button class="close" (click)="cerrarFormulario()">✖</button>
      <app-publicar-servicio
        (servicioPublicado)="onServicioPublicado()"
        (cerrar)="cerrarFormulario()">
      </app-publicar-servicio>
    </div>
  </div>

  <footer class="bottom-nav">
    <div class="active">
      <span class="material-icons-outlined">home</span>
      <span>Inicio</span>
    </div>
    <div (click)="irMisServicios()">
      <span class="material-icons-outlined">tune</span>
      <span>Servicios</span>
    </div>
    <div (click)="irSolicitudes()">
      <span class="material-icons-outlined">assignment</span>
      <span>Solicitudes</span>
    </div>
    <div (click)="irPerfil()">
      <span class="material-icons-outlined">person</span>
      <span>Perfil</span>
    </div>
  </footer>

</div>
