<div class="container">

  <header class="topbar">
    <h1>Servi<span class="click">Click</span></h1>
  </header>

  <div class="perfil-header">
    <div class="avatar-big">{{ iniciales }}</div>
    <h2>{{ nombreCompleto }} {{ apellido }}</h2>
    <p>Vendedor · ServiClick</p>
  </div>

  <div class="formulario">

    <div class="campo">
      <label>Nombre</label>
      <input type="text" [(ngModel)]="nombreCompleto"
        [disabled]="!modoEdicion"
        [class.input-disabled]="!modoEdicion">
    </div>

    <div class="campo">
      <label>Apellido</label>
      <input type="text" [(ngModel)]="apellido"
        [disabled]="!modoEdicion"
        [class.input-disabled]="!modoEdicion">
    </div>

    <div class="campo">
      <label>Correo electrónico</label>
      <input type="email" [(ngModel)]="correo"
        [disabled]="!modoEdicion"
        [class.input-disabled]="!modoEdicion">
    </div>

    <div class="campo">
      <label>Teléfono</label>
      <input type="text" [(ngModel)]="telefono"
        [disabled]="!modoEdicion"
        [class.input-disabled]="!modoEdicion">
    </div>

    <p *ngIf="mensajeExito" style="color:green; text-align:center;">{{ mensajeExito }}</p>
    <p *ngIf="mensajeError" style="color:red; text-align:center;">{{ mensajeError }}</p>

    <button *ngIf="!modoEdicion" class="btn-editar" (click)="activarEdicion()">
      Editar perfil
    </button>

    <div class="acciones" *ngIf="modoEdicion">
      <!-- Pide contraseña antes de guardar -->
      <button class="btn-guardar" (click)="pedirContrasena()">Guardar cambios</button>
      <button class="btn-cancelar" (click)="cancelarEdicion()">Cancelar</button>
    </div>

    <button class="btn-cancelar" (click)="cerrarSesion()" style="margin-top:16px;">
      Cerrar sesión
    </button>

  </div>

  <!-- MODAL CONFIRMACIÓN CONTRASEÑA -->
  <div class="modal" *ngIf="mostrarModalContrasena"
    style="position:fixed; top:0; left:0; width:100%; height:100%;
           background:rgba(0,0,0,0.5); display:flex;
           align-items:center; justify-content:center; z-index:999;">
    <div style="background:white; padding:30px; border-radius:16px;
                width:300px; text-align:center;">
      <h3>Confirmar identidad</h3>
      <p>Ingresa tu contraseña para guardar los cambios</p>
      <input
        type="password"
        [(ngModel)]="contrasenaConfirmacion"
        placeholder="Contraseña"
        style="width:100%; padding:10px; margin:10px 0;
               border-radius:8px; border:1px solid #ccc;">
      <p *ngIf="errorContrasena" style="color:red; font-size:14px;">
        {{ errorContrasena }}
      </p>
      <div style="display:flex; gap:10px; justify-content:center; margin-top:10px;">
        <button class="btn-guardar" (click)="confirmarYGuardar()">Confirmar</button>
        <button class="btn-cancelar" (click)="cancelarContrasena()">Cancelar</button>
      </div>
    </div>
  </div>

  <footer class="bottom-nav">
    <div (click)="irInicio()">
      <span class="material-icons-outlined">home</span>
      <span>Inicio</span>
    </div>
    <div (click)="irServicios()">
      <span class="material-icons-outlined">tune</span>
      <span>Servicios</span>
    </div>
    <div (click)="irSolicitudes()">
      <span class="material-icons-outlined">assignment</span>
      <span>Solicitudes</span>
    </div>
    <div class="active">
      <span class="material-icons-outlined">person</span>
      <span>Perfil</span>
    </div>
  </footer>

</div>
