<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<div class="login-wrap">

  <!-- PANEL IZQUIERDO -->
  <div class="login-left">

    <div class="login-left-content">

      <!-- ICONO -->
      <div class="login-icon-ring">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#e8520a"/>
        </svg>
      </div>

      <!-- LOGO -->
      <div class="login-brand">
        Servi<span>Click</span>
      </div>

      <!-- TEXTO -->
      <div class="login-tagline">

        Encuentra el servicio ideal<br>
        con los mejores expertos<br>
        en tu localidad
      </div>

      <!-- BOTON -->
      <div class="login-new-acc" tabindex="0" role="button" (click)="irRegistro()" (keydown.enter)="irRegistro()" (keydown.space)="irRegistro(); $event.preventDefault()">
        <span>¿No tienes cuenta? Regístrate →</span>
      </div>

    </div>

  </div>

  <!-- PANEL DERECHO -->
  <div class="login-right">

    <!-- ESTE DIV TE FALTABA -->
    <div class="login-right-inner">

      <!-- TITULO -->
      <div class="login-title">
        Bienvenido
      </div>

      <!-- SUB -->
      <div class="login-sub">
        Inicia sesión en tu cuenta
      </div>

      <!-- GOOGLE -->
      <!-- El overlay invisible contiene el botón real de Google (renderButton).
           El visual decorativo no intercepta clics (pointer-events:none). -->
      <div class="social-btn" style="position:relative;">

        <div id="gBtnLoginOverlay" class="google-btn-overlay"></div>

        <div class="google-btn-visual">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Continuar con Google</span>
        </div>

      </div>

      <!-- DIVIDER -->
      <div class="login-divider">
        <span>O CON TU CORREO</span>
      </div>

      <!-- EMAIL -->
      <div class="field-group">

        <div class="field-label">
          CORREO ELECTRÓNICO
        </div>

        <div class="field">
          <input
            type="text"
            placeholder="usuario@ejemplo.com"
            [(ngModel)]="usuario"
          >
        </div>

      </div>

      <!-- PASSWORD -->
      <div class="field-group">

        <div class="field-label">
          CONTRASEÑA
        </div>

        <div class="field">
          <input
            type="password"
            placeholder="••••••••"
            [(ngModel)]="password"
          >
        </div>

      </div>

      <!-- FORGOT -->
      <div class="forgot">
        <span>¿Olvidaste tu contraseña?</span>
      </div>

      <!-- BOTON -->
      <div class="btn-primary" tabindex="0" role="button" (click)="iniciarSesion()" (keydown.enter)="iniciarSesion()" (keydown.space)="iniciarSesion(); $event.preventDefault()">
        <span>Iniciar Sesión</span>
      </div>

      <!-- MENSAJE -->
      <p
        style="
          color:#ff4f6a;
          font-size:13px;
          margin-top:16px;
          font-family:'Mulish',sans-serif;
          text-align:center;
        "
      >
        {{ mensaje }}
      </p>

    </div>

  </div>

</div>
