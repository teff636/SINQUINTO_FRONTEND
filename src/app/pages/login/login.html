<div class="container">

  <div class="left-panel">
    <h1>Bienvenido a Servi<span class="click">Click</span></h1>
    <p>¿No tienes una cuenta?</p>

    <button class="btn-outline" (click)="irRegistro()">
      Registrarse
    </button>
  </div>

  <div class="right-panel">
    <div class="login-box">

      <h2>Iniciar Sesión</h2>

      <input 
        type="text" 
        placeholder="Usuario" 
        [(ngModel)]="usuario"
      >

      <input 
        type="password" 
        placeholder="Password" 
        [(ngModel)]="password"
      >

      
      <button class="btn-login" (click)="iniciarSesion()">
        Iniciar Sesión
      </button>

      <p style="color:red">{{ mensaje }}</p>

    </div>
  </div>

</div>
