<div class="container">

  <!-- Lado izquierdo -->
  <div class="left-panel">
    <h1>Bienvenido a ServiClick!</h1>
    <p>¿No tienes una cuenta?</p>

    <!-- 🔥 BOTÓN CORREGIDO -->
    <button class="btn-outline" (click)="abrirRegistro()">
      Registrarse
    </button>
  </div>

  <!-- Lado derecho -->
  <div class="right-panel">
    <div class="login-box">

      <h2>Iniciar Sesión</h2>

      <input 
        type="text" 
        placeholder="Usuario" 
        [(ngModel)]="usuario"
      >

      <input 
        type="password" 
        placeholder="Password" 
        [(ngModel)]="password"
      >

      <!-- 🔥 TAMBIÉN ESTE BOTÓN -->
      <button class="btn-outline" (click)="abrirRegistro()">
        Registrarse
      </button>

      <button (click)="iniciarSesion()">
        Iniciar Sesión
      </button>

      <p style="color:red">{{ mensaje }}</p>

    </div>
  </div>

</div>

<!-- 🔥 MODAL (FUERA DEL CONTAINER, MUY IMPORTANTE) -->
<app-register-usuario 
  *ngIf="mostrarRegistro"
  (cerrar)="cerrarRegistro()">
</app-register-usuario>
