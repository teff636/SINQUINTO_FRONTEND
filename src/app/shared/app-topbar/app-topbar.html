<header class="topbar">
  <div [ngClass]="variant === 'vendor' ? 'logo' : 'brand'">
    Servi<span>Click</span>
  </div>

  <div class="top-actions">
    <div class="notif-wrapper" (click)="$event.stopPropagation()">
      <button class="icon-btn notif-btn" type="button" (click)="toggleNotif.emit()" aria-label="Notificaciones">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M18 8C18 6.4087 17.3679 4.88258 16.2426 3.75736C15.1174 2.63214 13.5913 2 12 2C10.4087 2 8.88258 2.63214 7.75736 3.75736C6.63214 4.88258 6 6.4087 6 8C6 15 3 17 3 17H21C21 17 18 15 18 8Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6981 21.5547 10.4458 21.3031 10.27 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="notif-badge" *ngIf="badgeCount > 0">{{ badgeCount }}</span>
      </button>

      <div class="notif-dropdown" *ngIf="notifAbierta">
        <div class="notif-header">
          <strong>Notificaciones</strong>
          <div class="notif-header-actions">
            <button class="notif-mark-all-btn" type="button" *ngIf="itemsNotif.length > 0" (click)="marcarTodas.emit()">Marcar todas</button>
            <button class="notif-close" type="button" (click)="cerrarNotif.emit()">×</button>
          </div>
        </div>
        <div *ngIf="itemsNotif.length === 0" class="notif-empty">
          Sin notificaciones pendientes
        </div>
        <div class="notif-item" *ngFor="let n of itemsNotif">
          <p class="notif-title">{{ n.title }}</p>
          <p class="notif-msg">{{ n.message }}</p>
          <p class="notif-date" *ngIf="n.createdAt">{{ n.createdAt | date:'dd/MM/yyyy HH:mm' }}</p>
          <ng-container *ngIf="variant === 'client'">
            <button class="notif-action-btn" *ngIf="n.type === 'APPOINTMENT_ACCEPTED'" type="button" (click)="manejarNotif.emit(n)">Ver estado</button>
            <button class="notif-action-btn" *ngIf="n.type === 'APPOINTMENT_REJECTED'" type="button" (click)="manejarNotif.emit(n)">Entendido</button>
            <button class="notif-resena-btn" *ngIf="n.type === 'APPOINTMENT_COMPLETED'" type="button" (click)="manejarNotif.emit(n)">Añadir reseña</button>
          </ng-container>
          <button class="notif-action-btn" *ngIf="variant === 'vendor'" type="button" (click)="manejarNotif.emit(n)">Ver más</button>
        </div>
      </div>
    </div>

    <button [ngClass]="variant === 'vendor' ? 'home-link' : 'home-btn'" type="button" (click)="goInicio.emit()">
      <span class="material-icons-outlined">home</span>
      <span>Inicio</span>
    </button>

    <button [ngClass]="variant === 'vendor' ? 'avatar' : 'avatar-btn'" type="button" (click)="goPerfil.emit()">
      {{ iniciales }}
    </button>
  </div>
</header>
